<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Email Pilot AI{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
  <script src="{{ url_for('static', path='vendor/htmx.min.js') }}"></script>
  <script defer src="{{ url_for('static', path='vendor/alpine.min.js') }}"></script>
  <script defer src="{{ url_for('static', path='js/app.js') }}"></script>
</head>
<body
  data-current-path="{{ current_path or request.url.path }}"
  data-workspace-root="{{ dialog_workspace_root or '' }}"
  data-auto-open-modal="{{ auto_open_modal or '' }}"
  data-native-dialog="unknown"
  data-shell-mode="{{ shell_context.shell_mode }}"
  data-native-dialog-state="{{ shell_context.native_dialog_state }}"
  data-native-dialog-expected="{{ 'yes' if shell_context.native_dialog_expected else 'no' }}"
>
  <div class="shell">
    <div class="topbar">
      <div class="brand">Email Pilot AI</div>
      <div class="nav">
        <a href="/" class="{% if (current_path or request.url.path) == '/' %}active{% endif %}">홈</a>
        <a href="/sync" class="{% if (current_path or request.url.path) == '/sync' %}active{% endif %}">동기화</a>
        <a href="/review" class="{% if (current_path or request.url.path) == '/review' %}active{% endif %}">리뷰</a>
        <a href="/settings" class="{% if (current_path or request.url.path) == '/settings' %}active{% endif %}">설정</a>
        <a href="/admin/features" class="secondary {% if (current_path or request.url.path) == '/admin/features' %}active{% endif %}">고급 도구</a>
      </div>
    </div>
    {% if notice %}
    <div class="banner success">{{ notice }}</div>
    {% endif %}
    {% if error %}
    <div class="banner error">{{ error }}</div>
    {% endif %}
    {% block body %}{% endblock %}
  </div>
</body>
</html>
